<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · Ordre</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23242424'/%3E%3Ctext x='50%25' y='56%25' font-family='system-ui' font-size='18' font-weight='600' text-anchor='middle' fill='white'%3EO%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="dashboard">

<div class="app">
  <div id="sidebar-mount"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Dashboard</h1>
        <span class="pill">
          <span class="dot" style="background: var(--charcoal); animation: pulse 1.8s infinite;"></span>
          Week 3 · La Fàbrica shoot
        </span>
      </div>
      <div class="topbar-right">
        <div class="input-group" style="width: 260px;">
          <span class="input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
          <input class="input" placeholder="Search POs, suppliers…" />
          <span style="position: absolute; right: 10px;"><span class="kbd">⌘K</span></span>
        </div>
        <button class="btn btn-icon" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
        </button>
        <a class="btn btn-primary" href="po-new.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New purchase order
        </a>
      </div>
    </header>

    <div class="page">
      <!-- ================= Hero heading ================= -->
      <section class="page-hero reveal">
        <div class="eyebrow">Overview · April 2026</div>
        <h1 class="display-xl">Good morning, Ariadna.<br><span class="muted">Three POs moved since yesterday.</span></h1>
      </section>

      <!-- ================= Metrics row ================= -->
      <section class="hero-metrics mb-8">
        <div class="scorecard reveal reveal-d1" id="metric-committed"></div>
        <div class="scorecard reveal reveal-d2" id="metric-invoiced"></div>
        <div class="scorecard reveal reveal-d3" id="metric-remaining"></div>
        <div class="scorecard reveal reveal-d4" id="metric-pending"></div>
      </section>

      <!-- ================= Split: recent POs + approvals queue ================= -->
      <section class="grid grid-split mb-8 reveal reveal-d5">
        <div>
          <div class="block-title">
            <h3>Recent purchase orders</h3>
            <span class="count" id="count-recent">—</span>
            <span class="grow"></span>
            <a class="btn btn-link" href="purchase-orders.html">View all →</a>
          </div>
          <div class="list" id="list-recent"></div>
        </div>

        <div>
          <div class="block-title">
            <h3>Approvals awaiting you</h3>
            <span class="count" id="count-approvals">—</span>
            <span class="grow"></span>
            <a class="btn btn-link" href="approvals.html">Queue →</a>
          </div>
          <div class="stack stack-3" id="approvals-queue"></div>
        </div>
      </section>

      <!-- ================= Split: supplier leaderboard + activity ================= -->
      <section class="grid grid-split reveal reveal-d6">
        <div>
          <div class="block-title">
            <h3>Top suppliers</h3>
            <span class="count">By committed this quarter</span>
          </div>
          <div class="card" id="supplier-leaderboard"></div>
        </div>
        <div>
          <div class="block-title">
            <h3>Activity</h3>
          </div>
          <div class="card">
            <div class="timeline" id="activity"></div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
  const m = Ordre.workspaceMetrics();

  // ---- Metric cards ----
  function metricCard(label, value, sub, trendNote, spark) {
    return `
      <div class="scorecard-head">
        <span class="eyebrow">${label}</span>
        ${trendNote ? `<span class="scorecard-delta">${trendNote}</span>` : ''}
      </div>
      <div class="metric-value" style="font-size: 36px;">${value}</div>
      ${sub || ''}
      ${spark || ''}
    `;
  }

  document.getElementById('metric-committed').innerHTML = metricCard(
    'Committed YTD',
    Ordre.eur(m.committed),
    `<div class="split-meter"><div class="seg seg-committed" style="width:100%"></div></div>
     <span class="muted" style="font-size:12px;">Across ${Ordre.purchaseOrders.filter(p => p.status !== 'draft').length} POs</span>`,
    `<strong>+€1.2k</strong> this week`,
    sparkline([3, 4, 6, 5, 7, 8, 8, 10, 12, 13, 15, 16])
  );

  document.getElementById('metric-invoiced').innerHTML = metricCard(
    'Invoiced',
    Ordre.eur(m.invoiced),
    `<div class="split-meter"><div class="seg seg-invoiced" style="width:${Math.round((m.invoiced/m.committed)*100)}%"></div></div>
     <span class="muted" style="font-size:12px;">${Math.round((m.invoiced/m.committed)*100)}% of committed</span>`,
    `<strong>4</strong> invoices this week`,
    sparkline([1, 2, 2, 3, 4, 4, 6, 7, 8, 9, 10, 11])
  );

  document.getElementById('metric-remaining').innerHTML = metricCard(
    'Remaining to spend',
    Ordre.eur(m.remaining),
    `<div class="split-meter"><div class="seg seg-committed" style="width:${Math.round((m.remaining/m.committed)*100)}%"></div></div>
     <span class="muted" style="font-size:12px;">Across open POs</span>`,
    '',
    sparkline([8, 8, 7, 7, 6, 7, 6, 5, 5, 4, 4, 3].reverse())
  );

  document.getElementById('metric-pending').innerHTML = `
    <div class="scorecard-head">
      <span class="eyebrow">Pending approval</span>
      <span class="scorecard-delta"><strong>${m.pendingApprovals}</strong> POs</span>
    </div>
    <div class="metric-value" style="font-size: 36px;">${m.pendingApprovals}</div>
    <div class="stack stack-2" style="margin-top: 4px;">
      ${Ordre.purchaseOrders.filter(p => p.status === 'pending_approval').slice(0, 3).map((po) => {
        const s = Ordre.supplierById(po.supplierId);
        const t = Ordre.poTotals(po);
        return `<a href="po-detail.html?id=${po.id}" class="row" style="gap:8px; text-decoration:none;">
          <div class="supplier-monogram" style="width:22px;height:22px;font-size:10px;border-radius:6px;">${s.monogram}</div>
          <span style="font-size:12.5px;color:var(--midnight);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.tradeName}</span>
          <span class="num" style="font-size:12px;color:var(--mid-gray);">${Ordre.eur(t.committed)}</span>
        </a>`;
      }).join('')}
    </div>
  `;

  // ---- Recent POs list ----
  const recent = [...Ordre.purchaseOrders]
    .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''))
    .slice(0, 5);
  document.getElementById('count-recent').textContent = recent.length;

  const listHeader = `
    <div class="list-header" style="grid-template-columns: 110px 1fr 110px 100px 90px;">
      <div>Number</div><div>Supplier</div><div class="text-right">Committed</div><div class="text-right">Progress</div><div class="text-right">Status</div>
    </div>`;
  document.getElementById('list-recent').innerHTML = listHeader + recent.map((po) => {
    const s = Ordre.supplierById(po.supplierId);
    const t = Ordre.poTotals(po);
    const pct = t.committed ? Math.min(100, Math.round((t.invoiced / t.committed) * 100)) : 0;
    return `
      <a href="po-detail.html?id=${po.id}" class="list-row list-row-interactive" style="grid-template-columns: 110px 1fr 110px 100px 90px; text-decoration: none;">
        <div class="mono">${po.number.replace('PO-', '')}</div>
        <div class="supplier-cell">
          <div class="supplier-monogram">${s.monogram}</div>
          <div class="supplier-txt">
            <span class="n">${s.tradeName}</span>
            <span class="m">${po.lines.length} line${po.lines.length !== 1 ? 's' : ''} · ${Ordre.relDate(po.createdAt)}</span>
          </div>
        </div>
        <div class="text-right num" style="font-weight:600; color:var(--charcoal); font-size:14px;">${Ordre.eur(t.committed)}</div>
        <div class="mini-progress">
          <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="value">${pct}%</span>
        </div>
        <div class="text-right"><span class="pill ${Ordre.statusClass(po.status)}"><span class="dot"></span>${Ordre.statusLabel(po.status)}</span></div>
      </a>
    `;
  }).join('');

  // ---- Approvals queue ----
  const pending = Ordre.purchaseOrders.filter((p) => p.status === 'pending_approval');
  document.getElementById('count-approvals').textContent = pending.length;
  document.getElementById('approvals-queue').innerHTML = pending.map((po) => {
    const s = Ordre.supplierById(po.supplierId);
    const t = Ordre.poTotals(po);
    return `
      <div class="card card-sm stack stack-3">
        <div class="row-between">
          <div class="row" style="gap: 10px;">
            <div class="supplier-monogram" style="width:32px;height:32px;font-size:12px;border-radius:8px;">${s.monogram}</div>
            <div class="stack" style="gap:1px;line-height:1.25;">
              <span style="font-size:13.5px;font-weight:600;color:var(--charcoal);">${s.tradeName}</span>
              <span style="font-size:12px;color:var(--mid-gray);" class="mono">${po.number}</span>
            </div>
          </div>
          <span class="display-sm" style="font-size:17px;" class="num">${Ordre.eur(t.committed)}</span>
        </div>
        <div style="font-size:12.5px;color:var(--mid-gray);line-height:1.45;">
          ${po.lines.length} line${po.lines.length !== 1 ? 's' : ''} · submitted ${Ordre.relDate(po.submittedAt)} · requested by ${po.createdBy.split(' ')[0]}
        </div>
        <div class="row" style="gap: 8px;">
          <a href="po-detail.html?id=${po.id}" class="btn btn-ghost btn-sm">Review</a>
          <button class="btn btn-primary btn-sm approve-btn" data-po="${po.number}">Approve</button>
        </div>
      </div>
    `;
  }).join('') || `<div class="empty"><div class="empty-title">All caught up</div><div class="empty-body">No POs are waiting on you right now.</div></div>`;

  // Approve button demo action
  document.querySelectorAll('.approve-btn').forEach((b) => b.addEventListener('click', (e) => {
    e.preventDefault();
    Ordre.toast(`${b.dataset.po} approved`);
    b.closest('.card').style.opacity = '0.4';
    b.closest('.card').style.pointerEvents = 'none';
  }));

  // ---- Top suppliers leaderboard ----
  const bySupplier = {};
  Ordre.purchaseOrders.forEach((po) => {
    if (po.status === 'draft' || po.status === 'rejected') return;
    const t = Ordre.poTotals(po);
    bySupplier[po.supplierId] = (bySupplier[po.supplierId] || 0) + t.committed;
  });
  const top = Object.entries(bySupplier).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxSpend = Math.max(...top.map((x) => x[1]));
  document.getElementById('supplier-leaderboard').innerHTML = `
    <div class="stack stack-4">
    ${top.map(([sid, spend]) => {
      const s = Ordre.supplierById(sid);
      const pct = Math.round((spend / maxSpend) * 100);
      return `
        <a href="suppliers.html?id=${sid}" class="stack stack-2" style="text-decoration:none;">
          <div class="row-between">
            <div class="row" style="gap: 10px;">
              <div class="supplier-monogram" style="width:28px;height:28px;font-size:11px;border-radius:6px;">${s.monogram}</div>
              <span style="font-size:13px;font-weight:500;color:var(--charcoal);">${s.tradeName}</span>
            </div>
            <span class="num" style="font-size:13px;font-weight:600;color:var(--charcoal);">${Ordre.eur(spend)}</span>
          </div>
          <div class="progress progress-thin"><div class="progress-fill" style="width:${pct}%"></div></div>
        </a>
      `;
    }).join('')}
    </div>
  `;

  // ---- Activity timeline ----
  const events = [
    { initials: 'MR', title: 'Marc approved PO-2026-0042', body: 'Mobiliari Sant Martí · €1,340 · set dressing furniture', time: '11h ago', state: 'done' },
    { initials: 'LS', title: 'Laia uploaded invoice B-2026-0089', body: 'Bravo Lights · €2,040 on PO-2026-0041', time: '14h ago', state: 'done' },
    { initials: 'BD', title: 'Biel submitted PO-2026-0039 for approval', body: 'Tèxtils Badalona · set drapery, awaiting Marc', time: '1d ago', state: 'active' },
    { initials: 'MR', title: 'Marc rejected PO-2026-0035', body: 'Bravo Lights · scope too wide, ask to re-scope to 3 days', time: '3d ago', state: 'reject' },
    { initials: 'AP', title: 'Ariadna closed PO-2026-0040', body: 'Papereria Costa · fully invoiced at €154', time: '1w ago', state: 'done' },
  ];
  document.getElementById('activity').innerHTML = events.map((e) => `
    <div class="timeline-item is-${e.state}">
      <div class="timeline-header">
        <span class="avatar avatar-sm">${e.initials}</span>
        <span class="timeline-title">${e.title}</span>
        <span class="timeline-time">${e.time}</span>
      </div>
      <div class="timeline-body">${e.body}</div>
    </div>
  `).join('');
</script>
</body>
</html>
