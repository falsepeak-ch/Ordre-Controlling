<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Suppliers · Ordre</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23242424'/%3E%3Ctext x='50%25' y='56%25' font-family='system-ui' font-size='18' font-weight='600' text-anchor='middle' fill='white'%3EO%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="suppliers">

<div class="app">
  <div id="sidebar-mount"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Suppliers</h1>
      </div>
      <div class="topbar-right">
        <div class="input-group" style="width: 260px;">
          <span class="input-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          </span>
          <input id="search" class="input" placeholder="Name or tax ID…" />
        </div>
        <button class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New supplier
        </button>
      </div>
    </header>

    <div class="page">
      <section class="page-hero reveal">
        <div class="eyebrow" id="hero-count">Directory</div>
        <h1 class="display-lg">The people you spend money with.<br><span class="muted">Contracts, certificates, and every PO, in one place.</span></h1>
      </section>

      <!-- Filter chips -->
      <section class="filter-bar reveal reveal-d1">
        <div class="btn-group" id="tag-tabs">
          <button class="is-active" data-tag="all">All</button>
          <button data-tag="furniture">Furniture</button>
          <button data-tag="textiles">Textiles</button>
          <button data-tag="lighting">Lighting</button>
          <button data-tag="catering">Catering</button>
          <button data-tag="office">Office</button>
          <button data-tag="construction">Construction</button>
        </div>
        <span class="grow"></span>
        <span class="muted" style="font-size: 12px;"><span id="result-count">—</span> suppliers</span>
      </section>

      <!-- Grid of suppliers -->
      <section class="grid grid-3 reveal reveal-d2" id="supplier-grid"></section>
    </div>
  </main>
</div>

<!-- Detail drawer -->
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="supplier-drawer" aria-hidden="true">
  <div class="drawer-header">
    <div class="row" style="gap: 10px; min-width: 0;">
      <div class="supplier-monogram" id="dw-monogram">—</div>
      <div class="stack" style="gap:1px;line-height:1.25;min-width:0;">
        <span class="display-sm mb-0" id="dw-name">—</span>
        <span class="muted mono" style="font-size: 12px;" id="dw-tax">—</span>
      </div>
    </div>
    <button class="btn btn-icon" id="close-drawer" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn btn-ghost" id="drawer-close">Close</button>
    <button class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>
      New PO with this supplier
    </button>
  </div>
</aside>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
  // ---- Render grid ----
  function supplierSummary(id) {
    const pos = Ordre.purchaseOrders.filter((p) => p.supplierId === id && p.status !== 'rejected');
    let committed = 0, invoiced = 0;
    pos.forEach((p) => { const t = Ordre.poTotals(p); committed += t.committed; invoiced += t.invoiced; });
    return { count: pos.length, open: pos.filter((p) => p.status !== 'closed').length, committed, invoiced };
  }

  function render(tag = 'all', query = '') {
    const items = Ordre.suppliers.filter((s) => {
      if (tag !== 'all' && !s.tags.includes(tag)) return false;
      if (query) {
        const q = query.toLowerCase();
        return s.tradeName.toLowerCase().includes(q) || s.legalName.toLowerCase().includes(q) || s.taxId.toLowerCase().includes(q);
      }
      return true;
    });

    document.getElementById('result-count').textContent = items.length;
    const grid = document.getElementById('supplier-grid');
    grid.innerHTML = items.map((s) => {
      const sum = supplierSummary(s.id);
      return `
        <div class="supplier-card" data-id="${s.id}">
          <div class="supplier-card-head">
            <div class="row" style="gap: 12px; min-width: 0;">
              <div class="supplier-monogram">${s.monogram}</div>
              <div class="stack" style="gap: 1px; min-width: 0;">
                <span class="supplier-name">${s.tradeName}</span>
                <span class="supplier-meta mono">${s.taxId}</span>
              </div>
            </div>
            <button class="btn btn-icon" aria-label="More" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
          </div>
          <div class="supplier-tags">
            ${s.tags.map((t) => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="supplier-stats">
            <div>
              <div class="supplier-stat-label">POs</div>
              <div class="supplier-stat-value">${sum.count}</div>
            </div>
            <div>
              <div class="supplier-stat-label">Committed</div>
              <div class="supplier-stat-value">${Ordre.eur(sum.committed)}</div>
            </div>
            <div>
              <div class="supplier-stat-label">Open</div>
              <div class="supplier-stat-value">${sum.open}</div>
            </div>
          </div>
        </div>
      `;
    }).join('') || `<div class="empty" style="grid-column: 1/-1;"><div class="empty-title">No suppliers match</div><div class="empty-body">Try a different filter.</div></div>`;

    document.querySelectorAll('.supplier-card').forEach((card) => {
      card.addEventListener('click', () => openDrawer(card.dataset.id));
    });
  }

  let currentTag = 'all', currentQuery = '';
  document.getElementById('hero-count').textContent = `Directory · ${Ordre.suppliers.length} suppliers`;
  render();

  document.querySelectorAll('#tag-tabs button').forEach((b) => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#tag-tabs button').forEach((x) => x.classList.remove('is-active'));
      b.classList.add('is-active');
      currentTag = b.dataset.tag;
      render(currentTag, currentQuery);
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    currentQuery = e.target.value;
    render(currentTag, currentQuery);
  });

  // ---- Drawer ----
  const drawer = document.getElementById('supplier-drawer');
  const backdrop = document.getElementById('backdrop');

  function openDrawer(id) {
    const s = Ordre.supplierById(id);
    const sum = supplierSummary(id);
    const pos = Ordre.purchaseOrders.filter((p) => p.supplierId === id).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));

    document.getElementById('dw-monogram').textContent = s.monogram;
    document.getElementById('dw-name').textContent = s.tradeName;
    document.getElementById('dw-tax').textContent = s.taxId;

    document.getElementById('drawer-body').innerHTML = `
      <div class="stack stack-6">
        <div class="grid grid-3" style="gap: var(--s-3);">
          <div class="card-sm card" style="padding: var(--s-4);">
            <div class="eyebrow" style="font-size: 10px;">Purchase orders</div>
            <div class="display-md mt-3" style="font-size: 22px;">${sum.count}</div>
          </div>
          <div class="card-sm card" style="padding: var(--s-4);">
            <div class="eyebrow" style="font-size: 10px;">Committed</div>
            <div class="display-md mt-3" style="font-size: 22px;">${Ordre.eur(sum.committed)}</div>
          </div>
          <div class="card-sm card" style="padding: var(--s-4);">
            <div class="eyebrow" style="font-size: 10px;">Invoiced</div>
            <div class="display-md mt-3" style="font-size: 22px;">${Ordre.eur(sum.invoiced)}</div>
          </div>
        </div>

        <div>
          <div class="block-title mb-3"><h3>Contact</h3></div>
          <div class="card stack stack-3">
            <div class="row" style="gap: 8px; font-size: 13.5px;">
              <span class="icon-box" style="width:26px;height:26px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>
              </span>
              ${s.email}
            </div>
            <div class="row" style="gap: 8px; font-size: 13.5px;">
              <span class="icon-box" style="width:26px;height:26px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 20 20 0 0 1-8.7-3.1 19.5 19.5 0 0 1-6-6 20 20 0 0 1-3.1-8.8A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8 9.8a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6A2 2 0 0 1 22 16.9z"/></svg>
              </span>
              ${s.phone}
            </div>
            <div class="row" style="gap: 8px; font-size: 13.5px; align-items: flex-start;">
              <span class="icon-box" style="width:26px;height:26px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </span>
              ${s.address}
            </div>
            <div class="divider"></div>
            <div class="row" style="justify-content: space-between; font-size: 12.5px;">
              <span class="muted">Payment terms</span>
              <span>${s.paymentTerms}</span>
            </div>
            <div class="row" style="justify-content: space-between; font-size: 12.5px;">
              <span class="muted">Onboarded</span>
              <span>${Ordre.formatDate(s.createdAt)}</span>
            </div>
          </div>
        </div>

        <div>
          <div class="block-title mb-3"><h3>Documents</h3><span class="count">${s.docs.length}</span></div>
          <div class="stack stack-2">
            ${s.docs.map((d) => `
              <div class="card card-sm" style="padding: var(--s-3) var(--s-4); display: grid; grid-template-columns: 32px 1fr auto; gap: var(--s-3); align-items: center;">
                <div class="invoice-doc" style="width:32px;height:38px;">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div class="stack" style="gap: 1px;">
                  <span style="font-size: 13px; font-weight: 500; color: var(--charcoal);">${d.name}</span>
                  <span class="muted" style="font-size: 11px;">${d.kind} · ${d.size}</span>
                </div>
                <button class="btn btn-icon" aria-label="Download">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
                </button>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div class="block-title mb-3"><h3>Purchase orders</h3><span class="count">${pos.length}</span></div>
          ${pos.length ? `
            <div class="list">
              ${pos.map((po) => {
                const t = Ordre.poTotals(po);
                return `
                  <a href="po-detail.html?id=${po.id}" class="list-row list-row-interactive" style="grid-template-columns: 110px 1fr 90px 100px; text-decoration: none;">
                    <div class="mono" style="font-size: 12px;">${po.number.replace('PO-', '')}</div>
                    <div>
                      <div style="font-size: 13px; color: var(--charcoal);">${po.lines.length} line${po.lines.length !== 1 ? 's' : ''}</div>
                      <div class="muted" style="font-size: 11px;">${Ordre.formatDate(po.createdAt)}</div>
                    </div>
                    <div class="num" style="font-size: 13px; font-weight: 500; text-align: right;">${Ordre.eur(t.committed)}</div>
                    <div style="text-align: right;"><span class="pill ${Ordre.statusClass(po.status)}"><span class="dot"></span>${Ordre.statusLabel(po.status)}</span></div>
                  </a>
                `;
              }).join('')}
            </div>
          ` : `<div class="empty" style="padding: var(--s-6) 0;"><div class="empty-body">No POs yet with this supplier.</div></div>`}
        </div>

        ${s.notes ? `
          <div>
            <div class="block-title mb-3"><h3>Notes</h3></div>
            <p class="muted" style="font-size: 13.5px; line-height: 1.6; margin: 0;">${s.notes}</p>
          </div>
        ` : ''}
      </div>
    `;

    drawer.classList.add('is-open');
    backdrop.classList.add('is-open');
    drawer.setAttribute('aria-hidden', 'false');
  }

  function closeDrawer() {
    drawer.classList.remove('is-open');
    backdrop.classList.remove('is-open');
    drawer.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('close-drawer').addEventListener('click', closeDrawer);
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  // Auto-open if ?id= in URL
  const auto = new URLSearchParams(location.search).get('id');
  if (auto) setTimeout(() => openDrawer(auto), 200);
</script>
</body>
</html>
